<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta</title>

    <!-- ICONOS -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="../../Css/style-sign_up.css">
</head>

<body>

    <main class="contenedor-registrar">

        <!-- encabezado -->
        <header class="contenedor-mostrar">
            <h1 class="titulo-mostrar">Crear Cuenta</h1>
            <p class="texto-mostrar">Regístrate para comenzar</p>
        </header>

        <!-- formularioo -->
        <form class="formulario-validar" action="#" method="post">

            <!-- nombre -->
            <div class="grupo-escribir">

                <label for="nombre">Nombre completo</label>

                <div class="contenedor-input" aria-label="ingresar nombre">
                    <i class="fa-regular fa-user icono-mostrar"></i>

                    <input type="text" id="nombre" name="nombre" class="campo-escribir" placeholder="Juan Pérez" required>
                </div>
            </div>

            <!-- CORREO -->
            <div class="grupo-escribir">

                <label for="correo">Correo electrónico</label>

                <div class="contenedor-input" aria-label="correo">
                    <i class="fa-regular fa-envelope icono-mostrar"></i>

                    <input type="email" id="correo" name="correo" class="campo-escribir" placeholder="tu@email.com" required>
                </div>
            </div>

            <!-- CONTRASEÑA -->
            <div class="grupo-escribir">

                <label for="clave">Contraseña</label>

                <div class="contenedor-input" aria-label="contraseña">
                    <i class="fa-solid fa-lock icono-mostrar"></i>

                    <input
                        type="password" id="clave" class="campo-escribir" placeholder="••••••••" required>

                        <input type="checkbox">
                </div>
            </div>

            <!-- confirmar -->
            <div class="grupo-escribir">

                <label for="confirmar">Confirmar contraseña</label>

                <div class="contenedor-input" aria-label="confirmar contraseña">
                    <i class="fa-solid fa-lock icono-mostrar"></i>

                    <input type="password" id="confirmar" class="campo-escribir" placeholder="••••••••" required>

                    <input type="checkbox">
                </div>
            </div>

            <!-- temrinos -->
            <div class="contenedor-aceptar">

                <input type="checkbox" id="aceptar" name="aceptar" class="casilla-activar" required>

                <label for="aceptar">
                    Acepto los términos y condiciones
                </label>

                <a href="../Login/login.html" class="enlace_login-new">¿Ya Tienes Una Cuenta? Iniciar Sesion</a>

            </div>

            <!-- boton -->
            <button type="submit" class="boton-registrar">
                Crear Cuenta
            </button>

        </form>

    </main>

</body>

</html>
