<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta 
    name="viewport" 
    content="width=device-width, initial-scale=1.0">


    <title>
        Iniciar Sesión | Calzado Cúcuta Store
    </title>


    <meta
    name="description"
    content="Inicia sesión en Calzado Cúcuta Store para acceder a tus compras, pedidos y productos favoritos."
    >


    <meta
    name="robots"
    content="noindex,nofollow"
    >


    <!-- Iconos -->
    <link 
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="../../Estilos/Css principal/importaciones/style-login.css">



</head>

<body>

<main class="contenedor-login">

    <section class="main__logo">         
        <img src="#"
            srcset="
                ../../Imagenes/LogoLogin_movil.webp 120w,
                ../../Imagenes/LogoLogin_tablet.webp 160w,
                ../../Imagenes/LogoLogin_desktop.webp 200w
            "
            sizes="
                (max-width: 480px) 120px,
                (max-width: 768px) 160px,
                200px
            "
            alt="Logo de login"
            >    
    </section>


    <section class="hero">
        <picture class="hero__picture">
            <source
                media="(max-width: 480px)"
                srcset="../../Imagenes/hero-movil.webp"
            >
            <source
                media="(max-width: 768px)"
                srcset="../../Imagenes/hero-tablet.webp"
            >
            <img
                src="#"
                alt="Zapatos deportivos"
                class="hero__imagen"
                fetchpriority="high"
                decoding="async"
            >
        </picture>
    </section>

    <section class="login">

        <!-- Encabezado -->

        <header class="login__encabezado">

            <h2 class="login__subtitulo">
                Bienvenido de nuevo
            </h2>

            <h1 class="login__titulo">
                Inicia sesión 
            </h1>

        </header>

        <!-- Formulario -->

        <form action="#" class="formulario-login" method="post">

            <fieldset class="formulario-login__datos">

                <legend class="formulario-login__titulo">
                    Acceso a la cuenta
                </legend>


                <!-- Correo -->

                <div class="formulario-login__grupo">

                    <label for="correo" class="formulario-login__label">
                        Correo electrónico
                    </label>

                    <div class="formulario-login__contenedor">

                        <i class="fa-regular fa-envelope"></i>

                        <input
                        class="formulario-login__campo"
                        type="email"
                        id="correo"
                        name="correo"
                        placeholder="Ej: david@gmail.com"
                        autocomplete="email"
                        required>
                    </div>
                </div>

                <!-- Contraseña -->

                <div class="formulario-login__grupo">

                    <label for="password" class="formulario-login__label">
                        Contraseña
                    </label>

                    <div class="formulario-login__contenedor">
                        <i class="fa-solid fa-lock"></i>
                        <input
                        class="formulario-login__campo"
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Ingresa tu contraseña"
                        autocomplete="current-password"
                        minlength="8"
                        required>

                        <button
                        type="button"
                        class="formulario-login__mostrar"
                        aria-label="Mostrar contraseña">

                            <i class="fa-regular fa-eye"></i>
                        
                        </button>

                    </div>

                </div>

                <!-- Opciones -->

                <div class="formulario-login__opciones">

                    <div class="formulario-login__recordar">

                        <input
                        type="checkbox"
                        id="recordar"
                        name="recordar"
                        class="formulario-login__checkbox">


                        <label for="recordar">
                            Recordarme
                        </label>

                    </div>

                    <a href="#" class="formulario-login__enlace">
                        ¿Olvidaste tu contraseña?
                    </a>
                </div>

                <!-- Botón -->

                <button type="submit" id="botonLogin" class="formulario-login__boton">
                    <span>Iniciar Sesion </span>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>

                <!-- Registro -->

                <p class="formulario-login__registro">
                    ¿No tienes una cuenta?

                    <a href="../signUp/signUp.html" class="formulario-login__enlace">
                        Crear cuenta
                    </a>
                </p>

            </fieldset>

        </form>

    </section>

</main>

</body>

<script type="module" src="../../JavaScript/controladores/loginControlador.js"></script>

</html>
