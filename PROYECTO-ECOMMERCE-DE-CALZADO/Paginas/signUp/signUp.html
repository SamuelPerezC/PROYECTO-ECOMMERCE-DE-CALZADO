<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta 
    name="viewport" 
    content="width=device-width, initial-scale=1.0">

    <title>
        Crear Cuenta | Calzado Cúcuta Store
    </title>

    <meta
    name="description"
    content="Crea tu cuenta en Calzado Cúcuta Store y disfruta de una experiencia de compra personalizada."
    >

    <meta
    name="robots"
    content="noindex,nofollow"
    >
    
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="../../Estilos/Css principal/importaciones/style-signUp.css">
</head>

<body>

<main class="contenedor-registro">

    <section class="main__logo">         
        <img src="../../imagenes/logo-css.webp"
            srcset="
                ../../Imagenes/LogoLogin_movil.webp 120w,
                ../../Imagenes/LogoLogin_tablet.webp 160w,
                ../../Imagenes/LogoLogin_desktop.webp 200w
            "
            sizes="
                (max-width: 480px) 120px,
                (max-width: 768px) 160px,
                200px
            "
            alt="Logo de login"
            >    
    </section>


    <section class="hero">
        <picture class="hero__picture">
            <source
                media="(max-width: 480px)"
                srcset="../../imagenes/hero-movil1.webp"
            >
            <source
                media="(max-width: 768px)"
                srcset="../../imagenes/hero-tablet1.webp"
            >
            <img
                src="../../imagenes/hero-desktop1.webp"
                alt="Zapatos deportivos"
                class="hero__imagen"
                fetchpriority="high"
                decoding="async"
            >
        </picture>
    </section>

    <section class="registro">

        <!-- Encabezado -->

        <header class="registro__encabezado">
            <h2 class="registro__subtitulo">Crear Cuenta</h2>

            <h1 class="registro__titulo">Regístrarse </h1>

            <p class="registro__texto">Completa Tus Datos Para Crear Tu Cuenta</p>

        </header>


        <!-- Formulario -->

        <form action="#"class="formulario-validar" method="post">

            <fieldset class="formulario__datos">

                <legend class="formulario__titulo"> Datos personales </legend>

                <!-- Nombre -->

                <div class="formulario-login__grupo" aria-label="ingresar nombre">

                    <label for="nombre"class="formulario-login__label">
                        Nombre completo
                    </label>

                    <div class="formulario-login__contenedor">

                        <i class="fa-solid fa-user"></i>

                        <input
                        class="formulario-login__campo"
                        type="text"
                        id="nombre"
                        name="nombre"
                        placeholder="Ej: Pedro Castaño"
                        autocomplete="name"
                        minlength="3"
                        required>
                    </div>
                </div>


                <!-- Correo -->

                <div class="formulario-login__grupo" aria-label="correo">

                    <label for="correo" class="formulario-login__label">
                        Correo electrónico
                    </label>

                    <div class="formulario-login__contenedor">

                        <i class="fa-regular fa-envelope"></i>

                        <input
                        class="formulario-login__campo"
                        type="email"
                        id="correo"
                        name="correo"
                        placeholder="Ej: david@gmail.com"
                        autocomplete="email"
                        required>
                    </div>
                </div>


                <!-- Contraseña -->

                <div class="formulario-login__grupo" aria-label="contraseña">


                    <label for="password" class="formulario-login__label">
                        Contraseña
                    </label>

                    <div class="formulario-login__contenedor">

                        <i class="fa-solid fa-lock"></i>


                        <input
                        class="formulario-login__campo"
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Ingresa una contraseña"
                        autocomplete="new-password"
                        minlength="8"
                        required>

                        <button
                        type="button"
                        class="formulario-login__mostrar"
                        aria-label="Mostrar contraseña">

                            <i class="fa-regular fa-eye"></i>
                        
                        </button>
                    </div>

                </div>


                <!-- Confirmar contraseña -->

                <div class="formulario-login__grupo" aria-label="Confirmar contraseña">

                    <label for="repeatPassword" class="formulario-login__label">
                        Confirmar contraseña
                    </label>

                    <div class="formulario-login__contenedor">

                        <i class="fa-solid fa-lock"></i>

                        <input
                        class="formulario-login__campo"
                        type="password"
                        id="repeatPassword"
                        name="repeatPassword"
                        placeholder="Repite tu contraseña"
                        autocomplete="new-password"
                        minlength="8"
                        required>

                        <button
                        type="button"
                        class="formulario-login__mostrar"
                        aria-label="Mostrar contraseña">

                            <i class="fa-regular fa-eye"></i>
                        
                        </button>
                    </div>

                </div>

                <!-- Terminos -->

                <div class="formulario__terminos" aria-label="temrinos y condiciones">

                    <input
                    class="formulario-login__checkbox"
                    type="checkbox"
                    id="terminos"
                    name="terminos"
                    required>


                    <label for="terminos" class="formulario-login__label-terminos">
                        Acepto los términos y condiciones
                    </label>

                </div>

                <!-- Botón -->

                <button 
                type="submit"
                id="botonRegistrar"
                class="formulario-login__boton">

                    Crear Cuenta

                </button>

                <!-- Login -->

                <a 
                href="../Login/login.html"
                class="formulario__enlace">

                    ¿Ya tienes una cuenta? <span class="formulario__ enlace form-login"> Iniciar Sesion</span>

                </a>

            </fieldset>

        </form>

    </section>

</main>

</body>

<script type="module" src="../../JavaScript/controladores/signUpControlador.js"></script>

</html>
